<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
<defs><style>
.e-arm{animation:eWork 1s ease-in-out infinite}
@keyframes eWork{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}
.e-rec{animation:eBlink 0.85s step-end infinite}
@keyframes eBlink{0%,100%{opacity:1}50%{opacity:0}}
.e-man{animation:eSlide 5s ease-in-out infinite}
@keyframes eSlide{0%,62%{transform:translateX(165px);opacity:0}72%,88%{transform:translateX(0);opacity:1}97%,100%{transform:translateX(165px);opacity:0}}
.e-spark{animation:eSpark 1.8s ease-in-out infinite;animation-delay:0.6s}
@keyframes eSpark{0%,80%,100%{opacity:0}83%{opacity:1}86%{opacity:0}89%{opacity:0.8}92%{opacity:0}}
.e-light{animation:eFlicker 2s step-end infinite}
@keyframes eFlicker{0%,100%{fill:#FFF176}33%{fill:#FFEE58}66%{fill:#FFF9C4}}
</style></defs>

<!-- Shadows -->
<ellipse cx="106" cy="240" rx="46" ry="7" fill="rgba(0,0,0,0.13)"/>
<ellipse cx="196" cy="240" rx="58" ry="7" fill="rgba(0,0,0,0.1)"/>

<!-- ELECTRICAL CABINET -->
<g transform="translate(146,80)">
  <!-- Cabinet outer frame -->
  <rect x="0" y="0" width="88" height="155" rx="5" fill="#546E7A"/>
  <!-- Cabinet door (open, hinged left) -->
  <rect x="-28" y="2" width="32" height="151" rx="3" fill="#607D8B" transform="rotate(-12, 4, 77)"/>
  <!-- Door hinge -->
  <rect x="0" y="18" width="6" height="6" rx="1" fill="#37474F"/>
  <rect x="0" y="72" width="6" height="6" rx="1" fill="#37474F"/>
  <rect x="0" y="126" width="6" height="6" rx="1" fill="#37474F"/>
  <!-- Cabinet interior (dark) -->
  <rect x="6" y="6" width="76" height="143" rx="3" fill="#263238"/>
  <!-- DIN rail -->
  <rect x="10" y="12" width="68" height="4" rx="1" fill="#546E7A"/>
  <rect x="10" y="55" width="68" height="4" rx="1" fill="#546E7A"/>
  <rect x="10" y="98" width="68" height="4" rx="1" fill="#546E7A"/>
  <!-- Circuit breakers row 1 -->
  <rect x="12" y="16" width="12" height="35" rx="2" fill="#455A64"/>
  <rect x="14" y="18" width="8" height="5" rx="1" fill="#FFC107"/>
  <rect x="13" y="26" width="10" height="22" rx="1" fill="#37474F"/>
  <rect x="15" y="30" width="6" height="3" rx="1" fill="#E53935"/>
  <rect x="27" y="16" width="12" height="35" rx="2" fill="#455A64"/>
  <rect x="29" y="18" width="8" height="5" rx="1" fill="#4CAF50"/>
  <rect x="28" y="26" width="10" height="22" rx="1" fill="#37474F"/>
  <rect x="30" y="30" width="6" height="3" rx="1" fill="#4CAF50"/>
  <rect x="42" y="16" width="12" height="35" rx="2" fill="#455A64"/>
  <rect x="44" y="18" width="8" height="5" rx="1" fill="#FFC107"/>
  <rect x="43" y="26" width="10" height="22" rx="1" fill="#37474F"/>
  <rect x="45" y="30" width="6" height="3" rx="1" fill="#2196F3"/>
  <rect x="57" y="16" width="12" height="35" rx="2" fill="#455A64"/>
  <rect x="59" y="18" width="8" height="5" rx="1" fill="#4CAF50"/>
  <rect x="58" y="26" width="10" height="22" rx="1" fill="#37474F"/>
  <rect x="60" y="30" width="6" height="3" rx="1" fill="#4CAF50"/>
  <!-- Larger breaker row 2 -->
  <rect x="12" y="59" width="20" height="35" rx="2" fill="#37474F"/>
  <rect x="14" y="61" width="16" height="8" rx="1" fill="#E53935"/>
  <rect x="14" y="72" width="16" height="18" rx="1" fill="#2D3748"/>
  <rect x="36" y="59" width="20" height="35" rx="2" fill="#37474F"/>
  <rect x="38" y="61" width="16" height="8" rx="1" fill="#4CAF50"/>
  <rect x="38" y="72" width="16" height="18" rx="1" fill="#2D3748"/>
  <rect x="60" y="59" width="14" height="35" rx="2" fill="#455A64"/>
  <rect x="62" y="61" width="10" height="30" rx="1" fill="#1A237E"/>
  <!-- Indicator lights -->
  <circle class="e-light" cx="18" cy="104" r="5"/>
  <circle cx="34" cy="104" r="5" fill="#E53935"/>
  <circle cx="50" cy="104" r="5" fill="#4CAF50"/>
  <circle cx="66" cy="104" r="5" fill="#FFC107"/>
  <!-- Terminal block / cables -->
  <rect x="10" y="115" width="68" height="26" rx="3" fill="#1C2833"/>
  <!-- Cables -->
  <path d="M15 141 Q15 155 10 165" stroke="#EF5350" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M25 141 Q22 155 18 165" stroke="#1E88E5" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M35 141 Q35 152 28 165" stroke="#FFEE58" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M45 141 Q46 153 40 165" stroke="#212121" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M55 141 Q58 154 52 165" stroke="#66BB6A" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Spark effect -->
  <g class="e-spark" transform="translate(36,115)">
    <path d="M0 0 L4 -6 L2 -2 L7 -5 L3 -1" fill="#FFF176" stroke="#FFEE58" stroke-width="0.5"/>
  </g>
</g>

<!-- LEGS (dark work trousers) -->
<rect x="88" y="180" width="15" height="57" rx="7" fill="#37474F"/>
<rect x="106" y="180" width="15" height="57" rx="7" fill="#37474F"/>
<rect x="84" y="229" width="22" height="12" rx="5" fill="#1C2833"/>
<rect x="103" y="229" width="22" height="12" rx="5" fill="#1C2833"/>

<!-- BODY / DARK WORK SHIRT -->
<rect x="83" y="118" width="46" height="65" rx="8" fill="#455A64"/>
<!-- SAFETY VEST (orange/yellow) -->
<rect x="83" y="118" width="46" height="65" rx="8" fill="none" stroke="#FFC107" stroke-width="0"/>
<!-- Vest front panels -->
<path d="M83 118 L83 183 L97 183 L97 118 Z" fill="#F57F17" opacity="0.85"/>
<path d="M115 118 L115 183 L129 183 L129 118 Z" fill="#F57F17" opacity="0.85"/>
<!-- Reflective stripes on vest -->
<rect x="83" y="145" width="14" height="5" rx="2" fill="#FFEE58" opacity="0.9"/>
<rect x="115" y="145" width="14" height="5" rx="2" fill="#FFEE58" opacity="0.9"/>
<rect x="83" y="165" width="14" height="5" rx="2" fill="#FFEE58" opacity="0.9"/>
<rect x="115" y="165" width="14" height="5" rx="2" fill="#FFEE58" opacity="0.9"/>
<!-- Center chest stripe -->
<rect x="97" y="145" width="18" height="5" rx="1" fill="#FFEE58" opacity="0.8"/>
<rect x="97" y="165" width="18" height="5" rx="1" fill="#FFEE58" opacity="0.8"/>
<!-- Vest zip/seam -->
<line x1="106" y1="118" x2="106" y2="183" stroke="#E65100" stroke-width="2" opacity="0.6"/>

<!-- NECK + HEAD -->
<rect x="101" y="107" width="12" height="15" rx="6" fill="#FFCC99"/>
<circle cx="107" cy="87" r="23" fill="#FFCC99"/>
<!-- Blonde hair (barely visible under helmet) -->
<path d="M87 90 Q88 68 107 67 Q126 67 127 90" fill="#F9A825"/>
<ellipse cx="85" cy="91" rx="4" ry="5" fill="#FFCC99"/>
<ellipse cx="129" cy="91" rx="4" ry="5" fill="#FFCC99"/>
<circle cx="100" cy="89" r="3.5" fill="#1A1A1A"/>
<circle cx="114" cy="89" r="3.5" fill="#1A1A1A"/>
<circle cx="101" cy="88" r="1.2" fill="white"/><circle cx="115" cy="88" r="1.2" fill="white"/>
<!-- Concentrated brow -->
<path d="M97 83 L105 85" stroke="#E65100" stroke-width="2.5" stroke-linecap="round"/>
<path d="M110 85 L118 83" stroke="#E65100" stroke-width="2.5" stroke-linecap="round"/>
<path d="M101 99 Q107 102 113 99" stroke="#C68642" stroke-width="1.5" fill="none" stroke-linecap="round"/>

<!-- YELLOW HARD HAT -->
<ellipse cx="107" cy="73" rx="26" ry="10" fill="#FFC107"/>
<rect x="82" y="65" width="50" height="14" rx="7" fill="#FFC107"/>
<rect x="84" y="62" width="46" height="18" rx="8" fill="#FFB300"/>
<!-- Hat brim front shadow -->
<ellipse cx="107" cy="79" rx="28" ry="6" fill="#F57F17" opacity="0.5"/>
<!-- Hat dome highlight -->
<ellipse cx="100" cy="66" rx="12" ry="5" fill="rgba(255,255,255,0.2)"/>

<!-- LEFT ARM (static, cable in hand) -->
<g transform="translate(82,136) rotate(-12)">
  <rect x="-7" y="0" width="14" height="26" rx="7" fill="#455A64"/>
  <rect x="-7" y="22" width="14" height="22" rx="7" fill="#FFCC99"/>
  <!-- Cable -->
  <path d="M0 45 Q-5 55 2 62" stroke="#EF5350" stroke-width="3" fill="none" stroke-linecap="round"/>
</g>

<!-- RIGHT ARM + TOOL (working in cabinet - animated translateY) -->
<g transform="translate(128,118)">
  <g class="e-arm">
    <rect x="-7" y="0" width="14" height="26" rx="7" fill="#455A64"/>
    <rect x="-7" y="22" width="14" height="26" rx="7" fill="#FFCC99"/>
    <!-- Screwdriver -->
    <rect x="-2" y="44" width="6" height="26" rx="3" fill="#9E9E9E"/>
    <rect x="-3" y="44" width="8" height="10" rx="3" fill="#F57F17"/>
    <rect x="-1" y="68" width="4" height="8" rx="0" fill="#78909C"/>
  </g>
</g>

<!-- PHONE -->
<g transform="translate(273,147)">
  <rect x="0" y="0" width="30" height="52" rx="6" fill="#1C1C1C"/>
  <rect x="2" y="6" width="26" height="38" rx="2" fill="#0D1B2A"/>
  <circle cx="15" cy="3" r="3" fill="#2C2C2C"/><circle cx="15" cy="3" r="1.5" fill="#111"/>
  <circle class="e-rec" cx="7" cy="3" r="3.5" fill="#E53935"/>
  <rect x="3" y="7" width="24" height="14" rx="1" fill="#0A1628"/>
  <rect x="3" y="7" width="24" height="14" rx="1" fill="#263238" opacity="0.8"/>
  <path d="M4 11 L10 17 L16 11 L22 15" stroke="#FFEE58" stroke-width="1.2" fill="none"/>
  <rect x="3" y="23" width="18" height="7" rx="2" fill="#B71C1C"/>
  <text x="12" y="29" font-size="5" fill="white" font-family="monospace" text-anchor="middle" font-weight="bold">REC</text>
  <text x="15" y="40" font-size="4" fill="#455A64" font-family="monospace" text-anchor="middle">02:14</text>
</g>

<!-- MANUAL -->
<g class="e-man" transform="translate(230,106)">
  <rect x="5" y="5" width="80" height="106" rx="5" fill="rgba(0,0,0,0.18)"/>
  <rect x="0" y="0" width="80" height="106" rx="5" fill="#FAFAFA"/>
  <path d="M64 0 L80 0 L80 16 Z" fill="#FFFDE7"/>
  <path d="M64 0 L64 16 L80 16" stroke="#FFF176" stroke-width="1" fill="none"/>
  <rect x="0" y="0" width="64" height="24" rx="5" fill="#F57F17"/>
  <rect x="0" y="16" width="64" height="8" fill="#F57F17"/>
  <rect x="8" y="6" width="42" height="4" rx="2" fill="rgba(255,255,255,0.9)"/>
  <rect x="8" y="13" width="30" height="3" rx="2" fill="rgba(255,255,255,0.6)"/>
  <!-- Lightning bolt icon -->
  <path d="M57 4 L53 12 L57 12 L53 20 L61 10 L57 10 Z" fill="rgba(255,255,255,0.85)"/>
  <rect x="8" y="30" width="62" height="3" rx="2" fill="#B0BEC5"/>
  <rect x="8" y="38" width="54" height="3" rx="2" fill="#B0BEC5"/>
  <rect x="8" y="46" width="60" height="3" rx="2" fill="#B0BEC5"/>
  <rect x="8" y="54" width="44" height="3" rx="2" fill="#B0BEC5"/>
  <line x1="8" y1="64" x2="72" y2="64" stroke="#E0E0E0" stroke-width="1"/>
  <rect x="8" y="70" width="58" height="3" rx="2" fill="#B0BEC5"/>
  <rect x="8" y="78" width="50" height="3" rx="2" fill="#B0BEC5"/>
  <rect x="8" y="86" width="62" height="3" rx="2" fill="#B0BEC5"/>
  <rect x="8" y="94" width="38" height="3" rx="2" fill="#B0BEC5"/>
</g>
</svg>
