<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
<defs><style>
.s-arm{animation:sPress 0.9s ease-in-out infinite}
@keyframes sPress{0%,100%{transform:translateY(0)}50%{transform:translateY(7px)}}
.s-rec{animation:sBlink 0.85s step-end infinite}
@keyframes sBlink{0%,100%{opacity:1}50%{opacity:0}}
.s-man{animation:sSlide 5s ease-in-out infinite}
@keyframes sSlide{0%,62%{transform:translateX(165px);opacity:0}72%,88%{transform:translateX(0);opacity:1}97%,100%{transform:translateX(165px);opacity:0}}
.s-ekg{animation:ekgScroll 2s linear infinite}
@keyframes ekgScroll{0%{transform:translateX(0)}100%{transform:translateX(-40px)}}
.s-pulse{animation:sPulse 0.9s ease-in-out infinite}
@keyframes sPulse{0%,100%{opacity:0.6}50%{opacity:1}}
</style></defs>

<!-- Shadows -->
<ellipse cx="104" cy="240" rx="46" ry="7" fill="rgba(0,0,0,0.13)"/>
<ellipse cx="196" cy="240" rx="55" ry="7" fill="rgba(0,0,0,0.1)"/>

<!-- MEDICAL MACHINE -->
<g transform="translate(151,88)">
  <!-- Stand pole -->
  <rect x="34" y="125" width="12" height="50" rx="4" fill="#90A4AE"/>
  <!-- Base wheels -->
  <rect x="22" y="170" width="36" height="8" rx="4" fill="#78909C"/>
  <circle cx="26" cy="178" r="5" fill="#546E7A"/><circle cx="54" cy="178" r="5" fill="#546E7A"/>
  <!-- Machine body -->
  <rect x="0" y="0" width="80" height="128" rx="8" fill="#ECEFF1"/>
  <rect x="0" y="0" width="80" height="128" rx="8" fill="none" stroke="#CFD8DC" stroke-width="2"/>
  <!-- Screen area -->
  <rect x="6" y="6" width="68" height="52" rx="4" fill="#1A2332"/>
  <!-- EKG line (clipped animation) -->
  <clipPath id="ekgClip"><rect x="6" y="6" width="68" height="52" rx="4"/></clipPath>
  <g clip-path="url(#ekgClip)">
    <rect x="6" y="6" width="68" height="52" rx="4" fill="#0A1628"/>
    <!-- Green EKG grid -->
    <line x1="6" y1="20" x2="74" y2="20" stroke="#1B3A1B" stroke-width="0.5"/>
    <line x1="6" y1="33" x2="74" y2="33" stroke="#1B3A1B" stroke-width="0.5"/>
    <line x1="6" y1="46" x2="74" y2="46" stroke="#1B3A1B" stroke-width="0.5"/>
    <line x1="22" y1="6" x2="22" y2="58" stroke="#1B3A1B" stroke-width="0.5"/>
    <line x1="42" y1="6" x2="42" y2="58" stroke="#1B3A1B" stroke-width="0.5"/>
    <line x1="62" y1="6" x2="62" y2="58" stroke="#1B3A1B" stroke-width="0.5"/>
    <!-- EKG waveform (scrolling) -->
    <g class="s-ekg">
      <path d="M-40 32 L-28 32 L-22 32 L-18 14 L-14 46 L-10 32 L6 32 L12 32 L16 18 L20 44 L24 32 L40 32 L46 32 L50 16 L54 46 L58 32 L74 32 L80 32 L84 20 L88 44 L92 32 L108 32" 
            stroke="#00E676" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <!-- Heart rate readout -->
    <text class="s-pulse" x="58" y="58" font-size="9" fill="#00E676" font-family="monospace" font-weight="bold">72</text>
    <text x="48" y="58" font-size="5" fill="#4CAF50" font-family="monospace">BPM</text>
  </g>
  <!-- Screen labels -->
  <text x="8" y="67" font-size="5" fill="#78909C" font-family="monospace">SpO₂ 98%</text>
  <text x="45" y="67" font-size="5" fill="#78909C" font-family="monospace">TEMP 36.8</text>
  <!-- Button panel -->
  <rect x="6" y="72" width="68" height="50" rx="4" fill="#E0E0E0"/>
  <!-- Buttons row 1 -->
  <rect x="10" y="76" width="16" height="10" rx="3" fill="#42A5F5"/>
  <rect x="30" y="76" width="16" height="10" rx="3" fill="#66BB6A"/>
  <rect x="50" y="76" width="16" height="10" rx="3" fill="#EF5350"/>
  <!-- Buttons row 2 -->
  <rect x="10" y="90" width="16" height="10" rx="3" fill="#78909C"/>
  <rect x="30" y="90" width="16" height="10" rx="3" fill="#78909C"/>
  <rect x="50" y="90" width="16" height="10" rx="3" fill="#FFA726"/>
  <!-- Button labels -->
  <text x="18" y="84" font-size="4" fill="white" font-family="sans-serif" text-anchor="middle">START</text>
  <text x="38" y="84" font-size="4" fill="white" font-family="sans-serif" text-anchor="middle">OK</text>
  <text x="58" y="84" font-size="4" fill="white" font-family="sans-serif" text-anchor="middle">STOP</text>
  <!-- Indicator light -->
  <circle cx="72" cy="108" r="5" fill="#66BB6A" class="s-pulse"/>
  <!-- Brand tag -->
  <rect x="6" y="112" width="60" height="12" rx="2" fill="#CFD8DC"/>
  <text x="36" y="121" font-size="5" fill="#546E7A" font-family="monospace" text-anchor="middle">MED-SYS 4000</text>
</g>

<!-- LEGS (green scrub pants) -->
<rect x="88" y="180" width="15" height="57" rx="7" fill="#2E7D32"/>
<rect x="106" y="180" width="15" height="57" rx="7" fill="#2E7D32"/>
<rect x="84" y="229" width="22" height="12" rx="5" fill="#1B5E20"/>
<rect x="103" y="229" width="22" height="12" rx="5" fill="#1B5E20"/>

<!-- BODY / GREEN SCRUBS -->
<rect x="83" y="118" width="46" height="66" rx="8" fill="#388E3C"/>
<!-- V-neck detail -->
<path d="M106 118 L100 132 L106 136 L112 132 Z" fill="#2E7D32"/>
<!-- Scrub pocket -->
<rect x="87" y="148" width="18" height="14" rx="3" fill="#2E7D32"/>
<!-- ID badge -->
<rect x="113" y="128" width="10" height="14" rx="2" fill="white"/>
<rect x="115" y="130" width="6" height="3" rx="1" fill="#B0BEC5"/>
<rect x="115" y="135" width="6" height="1.5" rx="1" fill="#B0BEC5"/>
<rect x="115" y="138" width="4" height="1.5" rx="1" fill="#B0BEC5"/>

<!-- NECK + HEAD -->
<rect x="101" y="107" width="12" height="15" rx="6" fill="#DEB887"/>
<circle cx="107" cy="88" r="23" fill="#DEB887"/>
<path d="M88 83 Q90 63 107 62 Q124 62 126 83" fill="#1A1A1A"/>
<ellipse cx="85" cy="89" rx="4" ry="5" fill="#DEB887"/>
<ellipse cx="129" cy="89" rx="4" ry="5" fill="#DEB887"/>
<circle cx="100" cy="87" r="3.5" fill="#1A1A1A"/>
<circle cx="114" cy="87" r="3.5" fill="#1A1A1A"/>
<circle cx="101" cy="86" r="1.2" fill="white"/><circle cx="115" cy="86" r="1.2" fill="white"/>
<path d="M97 82 L104 83" stroke="#1A1A1A" stroke-width="2" stroke-linecap="round"/>
<path d="M110 83 L117 82" stroke="#1A1A1A" stroke-width="2" stroke-linecap="round"/>
<path d="M102 97 Q107 100 112 97" stroke="#A0785A" stroke-width="1.5" fill="none" stroke-linecap="round"/>
<!-- Glasses -->
<rect x="96" y="82" width="11" height="8" rx="3" fill="none" stroke="#546E7A" stroke-width="1.5"/>
<rect x="110" y="82" width="11" height="8" rx="3" fill="none" stroke="#546E7A" stroke-width="1.5"/>
<line x1="107" y1="86" x2="110" y2="86" stroke="#546E7A" stroke-width="1.5"/>

<!-- LEFT ARM (static) -->
<g transform="translate(82,136) rotate(-15)">
  <rect x="-7" y="0" width="14" height="26" rx="7" fill="#388E3C"/>
  <rect x="-7" y="22" width="14" height="22" rx="7" fill="#DEB887"/>
</g>

<!-- RIGHT ARM (pressing buttons - animated translateY) -->
<g transform="translate(128,122)">
  <g class="s-arm">
    <rect x="-7" y="0" width="14" height="26" rx="7" fill="#388E3C"/>
    <rect x="-7" y="22" width="14" height="26" rx="7" fill="#DEB887"/>
    <!-- Finger pointing -->
    <ellipse cx="0" cy="52" rx="4" ry="6" fill="#DEB887"/>
  </g>
</g>

<!-- PHONE -->
<g transform="translate(273,147)">
  <rect x="0" y="0" width="30" height="52" rx="6" fill="#1C1C1C"/>
  <rect x="2" y="6" width="26" height="38" rx="2" fill="#0D1B2A"/>
  <circle cx="15" cy="3" r="3" fill="#2C2C2C"/><circle cx="15" cy="3" r="1.5" fill="#111"/>
  <circle class="s-rec" cx="7" cy="3" r="3.5" fill="#E53935"/>
  <rect x="3" y="7" width="24" height="14" rx="1" fill="#0A1628"/>
  <rect x="8" y="8" width="10" height="12" rx="5" fill="#27AE60" opacity="0.4"/>
  <rect x="6" y="20" width="12" height="8" rx="2" fill="#27AE60" opacity="0.3"/>
  <rect x="3" y="23" width="18" height="7" rx="2" fill="#B71C1C"/>
  <text x="12" y="29" font-size="5" fill="white" font-family="monospace" text-anchor="middle" font-weight="bold">REC</text>
  <text x="15" y="40" font-size="4" fill="#455A64" font-family="monospace" text-anchor="middle">01:22</text>
</g>

<!-- MANUAL -->
<g class="s-man" transform="translate(230,106)">
  <rect x="5" y="5" width="80" height="106" rx="5" fill="rgba(0,0,0,0.18)"/>
  <rect x="0" y="0" width="80" height="106" rx="5" fill="#FAFAFA"/>
  <path d="M64 0 L80 0 L80 16 Z" fill="#E8F5E9"/>
  <path d="M64 0 L64 16 L80 16" stroke="#C8E6C9" stroke-width="1" fill="none"/>
  <rect x="0" y="0" width="64" height="24" rx="5" fill="#2E7D32"/>
  <rect x="0" y="16" width="64" height="8" fill="#2E7D32"/>
  <rect x="8" y="6" width="42" height="4" rx="2" fill="rgba(255,255,255,0.9)"/>
  <rect x="8" y="13" width="30" height="3" rx="2" fill="rgba(255,255,255,0.6)"/>
  <!-- Medical cross icon -->
  <rect x="53" y="5" width="8" height="2.5" rx="1" fill="rgba(255,255,255,0.8)"/>
  <rect x="56" y="2" width="2.5" height="8" rx="1" fill="rgba(255,255,255,0.8)"/>
  <rect x="8" y="30" width="62" height="3" rx="2" fill="#B0BEC5"/>
  <rect x="8" y="38" width="54" height="3" rx="2" fill="#B0BEC5"/>
  <rect x="8" y="46" width="60" height="3" rx="2" fill="#B0BEC5"/>
  <rect x="8" y="54" width="44" height="3" rx="2" fill="#B0BEC5"/>
  <line x1="8" y1="64" x2="72" y2="64" stroke="#E0E0E0" stroke-width="1"/>
  <rect x="8" y="70" width="58" height="3" rx="2" fill="#B0BEC5"/>
  <rect x="8" y="78" width="50" height="3" rx="2" fill="#B0BEC5"/>
  <rect x="8" y="86" width="62" height="3" rx="2" fill="#B0BEC5"/>
  <rect x="8" y="94" width="38" height="3" rx="2" fill="#B0BEC5"/>
</g>
</svg>
