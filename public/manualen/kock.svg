<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
<defs>
<style>
.k-arm{transform-box:fill-box;transform-origin:50% 0%;animation:kStir 1.4s ease-in-out infinite}
@keyframes kStir{0%{transform:rotate(-28deg)}25%{transform:rotate(-8deg)}50%{transform:rotate(28deg)}75%{transform:rotate(8deg)}100%{transform:rotate(-28deg)}}
.k-rec{animation:kBlink 0.85s step-end infinite}
@keyframes kBlink{0%,100%{opacity:1}50%{opacity:0}}
.k-man{animation:kSlide 5s ease-in-out infinite}
@keyframes kSlide{0%,62%{transform:translateX(165px);opacity:0}72%,88%{transform:translateX(0);opacity:1}97%,100%{transform:translateX(165px);opacity:0}}
.st1{animation:kSteam 2.2s ease-out infinite;animation-delay:0s}
.st2{animation:kSteam 2.2s ease-out infinite;animation-delay:0.7s}
.st3{animation:kSteam 2.2s ease-out infinite;animation-delay:1.4s}
@keyframes kSteam{0%{transform:translateY(0) translateX(0);opacity:0.7}50%{transform:translateY(-22px) translateX(4px);opacity:0.4}100%{transform:translateY(-42px) translateX(-3px);opacity:0}}
</style>
</defs>

<!-- Shadows -->
<ellipse cx="106" cy="240" rx="46" ry="7" fill="rgba(0,0,0,0.13)"/>
<ellipse cx="196" cy="240" rx="60" ry="7" fill="rgba(0,0,0,0.1)"/>

<!-- STOVE -->
<g transform="translate(145,188)">
  <!-- Stove body -->
  <rect x="0" y="0" width="92" height="48" rx="6" fill="#333"/>
  <rect x="4" y="4" width="84" height="40" rx="4" fill="#3D3D3D"/>
  <!-- Burner ring -->
  <circle cx="46" cy="18" r="22" fill="#2A2A2A"/>
  <circle cx="46" cy="18" r="18" fill="#222"/>
  <circle cx="46" cy="18" r="4" fill="#1A1A1A"/>
  <!-- Heat glow -->
  <circle cx="46" cy="18" r="16" fill="none" stroke="#FF5722" stroke-width="1" opacity="0.5"/>
  <circle cx="46" cy="18" r="12" fill="none" stroke="#FF9800" stroke-width="1" opacity="0.4"/>
  <!-- Control knobs -->
  <circle cx="12" cy="35" r="6" fill="#555"/>
  <circle cx="12" cy="35" r="3" fill="#444"/>
  <circle cx="80" cy="35" r="6" fill="#555"/>
  <circle cx="80" cy="35" r="3" fill="#444"/>
</g>

<!-- PAN -->
<g transform="translate(154,155)">
  <!-- Handle -->
  <rect x="-32" y="13" width="38" height="9" rx="4" fill="#555"/>
  <!-- Pan body -->
  <ellipse cx="40" cy="12" rx="38" ry="16" fill="#616161"/>
  <ellipse cx="40" cy="10" rx="35" ry="13" fill="#757575"/>
  <!-- Pan rim -->
  <ellipse cx="40" cy="10" rx="35" ry="13" fill="none" stroke="#9E9E9E" stroke-width="2"/>
  <!-- Food (sauce/stew) -->
  <ellipse cx="40" cy="10" rx="30" ry="10" fill="#BF360C" opacity="0.8"/>
  <ellipse cx="32" cy="8" rx="6" ry="4" fill="#D84315" opacity="0.6"/>
  <ellipse cx="50" cy="12" rx="5" ry="3" fill="#BF360C" opacity="0.7"/>
</g>

<!-- STEAM wisps -->
<g transform="translate(190,153)">
  <ellipse class="st1" cx="0" cy="0" rx="5" ry="9" fill="rgba(200,200,220,0.55)"/>
  <ellipse class="st2" cx="14" cy="0" rx="4" ry="8" fill="rgba(200,200,220,0.5)"/>
  <ellipse class="st3" cx="28" cy="0" rx="5" ry="9" fill="rgba(200,200,220,0.55)"/>
</g>

<!-- LEGS (white chef trousers) -->
<rect x="88" y="180" width="15" height="57" rx="7" fill="#EEEEEE"/>
<rect x="106" y="180" width="15" height="57" rx="7" fill="#EEEEEE"/>
<!-- Checkered pattern (simplified) -->
<rect x="89" y="184" width="7" height="5" rx="0" fill="#E0E0E0" opacity="0.7"/>
<rect x="96" y="189" width="7" height="5" rx="0" fill="#E0E0E0" opacity="0.7"/>
<rect x="89" y="194" width="7" height="5" rx="0" fill="#E0E0E0" opacity="0.7"/>
<rect x="107" y="184" width="7" height="5" rx="0" fill="#E0E0E0" opacity="0.7"/>
<rect x="114" y="189" width="7" height="5" rx="0" fill="#E0E0E0" opacity="0.7"/>
<rect x="107" y="194" width="7" height="5" rx="0" fill="#E0E0E0" opacity="0.7"/>
<rect x="85" y="229" width="22" height="12" rx="5" fill="#212121"/>
<rect x="104" y="229" width="22" height="12" rx="5" fill="#212121"/>

<!-- BODY / CHEF COAT (white double-breasted) -->
<rect x="83" y="118" width="46" height="65" rx="8" fill="#F5F5F5"/>
<!-- Coat front seam -->
<line x1="106" y1="118" x2="106" y2="183" stroke="#E0E0E0" stroke-width="2"/>
<!-- Buttons -->
<circle cx="106" cy="128" r="2.5" fill="#BDBDBD"/>
<circle cx="106" cy="140" r="2.5" fill="#BDBDBD"/>
<circle cx="106" cy="152" r="2.5" fill="#BDBDBD"/>
<!-- Apron strings -->
<rect x="98" y="148" width="16" height="3" rx="1" fill="#CFD8DC"/>
<!-- Pocket -->
<rect x="113" y="132" width="12" height="14" rx="3" fill="#EEEEEE"/>

<!-- NECK + HEAD -->
<rect x="102" y="107" width="12" height="15" rx="6" fill="#FFDAB9"/>
<circle cx="108" cy="87" r="23" fill="#FFDAB9"/>
<!-- Reddish hair (visible at sides) -->
<path d="M87 83 Q89 64 108 63 Q127 64 129 83" fill="#8D3A0F"/>
<ellipse cx="86" cy="89" rx="4" ry="5" fill="#FFDAB9"/>
<ellipse cx="130" cy="89" rx="4" ry="5" fill="#FFDAB9"/>
<circle cx="101" cy="87" r="3.5" fill="#2C1810"/>
<circle cx="115" cy="87" r="3.5" fill="#2C1810"/>
<circle cx="102" cy="86" r="1.2" fill="white"/><circle cx="116" cy="86" r="1.2" fill="white"/>
<!-- Happy brows -->
<path d="M98 82 Q102 79 106 82" stroke="#8D3A0F" stroke-width="2" stroke-linecap="round" fill="none"/>
<path d="M110 82 Q114 79 118 82" stroke="#8D3A0F" stroke-width="2" stroke-linecap="round" fill="none"/>
<!-- Smile -->
<path d="M101 97 Q108 104 115 97" stroke="#C68642" stroke-width="2" fill="none" stroke-linecap="round"/>
<!-- Rosy cheeks -->
<ellipse cx="96" cy="95" rx="6" ry="4" fill="rgba(255,120,100,0.25)"/>
<ellipse cx="120" cy="95" rx="6" ry="4" fill="rgba(255,120,100,0.25)"/>

<!-- CHEF HAT -->
<!-- Hat brim -->
<rect x="90" y="65" width="36" height="8" rx="3" fill="#F5F5F5"/>
<rect x="90" y="65" width="36" height="8" rx="3" fill="none" stroke="#E0E0E0" stroke-width="1.5"/>
<!-- Hat top (poofy cylinder) -->
<rect x="93" y="32" width="30" height="35" rx="12" fill="white"/>
<rect x="93" y="32" width="30" height="35" rx="12" fill="none" stroke="#E0E0E0" stroke-width="1.5"/>
<!-- Hat creases -->
<path d="M95 38 Q108 30 121 38" stroke="#EEEEEE" stroke-width="1" fill="none"/>
<path d="M95 44 Q108 36 121 44" stroke="#EEEEEE" stroke-width="1" fill="none"/>

<!-- LEFT ARM (holding pan handle) -->
<g transform="translate(80,136) rotate(25)">
  <rect x="-7" y="0" width="14" height="26" rx="7" fill="#F5F5F5"/>
  <rect x="-7" y="22" width="14" height="22" rx="7" fill="#FFDAB9"/>
</g>

<!-- RIGHT ARM + SPOON (stirring - animated) -->
<g transform="translate(130,122)">
  <g class="k-arm">
    <rect x="-7" y="0" width="14" height="26" rx="7" fill="#F5F5F5"/>
    <rect x="-7" y="22" width="14" height="26" rx="7" fill="#FFDAB9"/>
    <!-- Wooden spoon -->
    <rect x="-2" y="44" width="6" height="28" rx="3" fill="#8D6E63"/>
    <ellipse cx="1" cy="74" rx="6" ry="5" fill="#A1887F"/>
  </g>
</g>

<!-- PHONE -->
<g transform="translate(273,147)">
  <rect x="0" y="0" width="30" height="52" rx="6" fill="#1C1C1C"/>
  <rect x="2" y="6" width="26" height="38" rx="2" fill="#0D1B2A"/>
  <circle cx="15" cy="3" r="3" fill="#2C2C2C"/><circle cx="15" cy="3" r="1.5" fill="#111"/>
  <circle class="k-rec" cx="7" cy="3" r="3.5" fill="#E53935"/>
  <rect x="3" y="7" width="24" height="14" rx="1" fill="#0A1628"/>
  <ellipse cx="15" cy="14" rx="8" ry="6" fill="#E65100" opacity="0.3"/>
  <ellipse cx="15" cy="13" rx="5" ry="4" fill="#FF7043" opacity="0.35"/>
  <rect x="3" y="23" width="18" height="7" rx="2" fill="#B71C1C"/>
  <text x="12" y="29" font-size="5" fill="white" font-family="monospace" text-anchor="middle" font-weight="bold">REC</text>
  <text x="15" y="40" font-size="4" fill="#455A64" font-family="monospace" text-anchor="middle">00:58</text>
</g>

<!-- MANUAL -->
<g class="k-man" transform="translate(230,106)">
  <rect x="5" y="5" width="80" height="106" rx="5" fill="rgba(0,0,0,0.18)"/>
  <rect x="0" y="0" width="80" height="106" rx="5" fill="#FAFAFA"/>
  <path d="M64 0 L80 0 L80 16 Z" fill="#FFF8E1"/>
  <path d="M64 0 L64 16 L80 16" stroke="#FFE082" stroke-width="1" fill="none"/>
  <rect x="0" y="0" width="64" height="24" rx="5" fill="#E65100"/>
  <rect x="0" y="16" width="64" height="8" fill="#E65100"/>
  <rect x="8" y="6" width="42" height="4" rx="2" fill="rgba(255,255,255,0.9)"/>
  <rect x="8" y="13" width="30" height="3" rx="2" fill="rgba(255,255,255,0.6)"/>
  <!-- Chef hat icon -->
  <rect x="52" y="9" width="10" height="4" rx="1" fill="rgba(255,255,255,0.7)"/>
  <ellipse cx="57" cy="7" rx="5" ry="4" fill="rgba(255,255,255,0.6)"/>
  <rect x="8" y="30" width="62" height="3" rx="2" fill="#B0BEC5"/>
  <rect x="8" y="38" width="54" height="3" rx="2" fill="#B0BEC5"/>
  <rect x="8" y="46" width="60" height="3" rx="2" fill="#B0BEC5"/>
  <rect x="8" y="54" width="44" height="3" rx="2" fill="#B0BEC5"/>
  <line x1="8" y1="64" x2="72" y2="64" stroke="#E0E0E0" stroke-width="1"/>
  <rect x="8" y="70" width="58" height="3" rx="2" fill="#B0BEC5"/>
  <rect x="8" y="78" width="50" height="3" rx="2" fill="#B0BEC5"/>
  <rect x="8" y="86" width="62" height="3" rx="2" fill="#B0BEC5"/>
  <rect x="8" y="94" width="38" height="3" rx="2" fill="#B0BEC5"/>
</g>
</svg>
