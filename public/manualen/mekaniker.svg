<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
<defs><style>
.m-arm{transform-box:fill-box;transform-origin:50% 0%;animation:mScrew 1.1s ease-in-out infinite}
@keyframes mScrew{0%,100%{transform:rotate(-23deg)}50%{transform:rotate(23deg)}}
.m-rec{animation:mBlink 0.85s step-end infinite}
@keyframes mBlink{0%,100%{opacity:1}50%{opacity:0}}
.m-man{animation:mSlide 5s ease-in-out infinite}
@keyframes mSlide{0%,62%{transform:translateX(165px);opacity:0}72%,88%{transform:translateX(0);opacity:1}97%,100%{transform:translateX(165px);opacity:0}}
</style></defs>

<!-- Shadows -->
